<!-- 
 Email Validation
  -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Validation</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .box {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
      }
      .box input {
        padding: 12px 16px;
        font-size: 18px;
        border-radius: 4px;
        margin-right: 12px;
      }
      .inputBox {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Validate Email</h1>
      <div class="inputBox">
        <input
          type="text"
          name=""
          id="email"
          placeholder="Enter Email ID"
          onkeyup="validate(this.value)"
        />
        <span id="isValid"></span>
      </div>
    </div>

    <script>
      let span = document.getElementById("isValid");
      function validate(email) {
        isValid = true;
        if (email.indexOf("@") == -1) {
          isValid = false;
        } else if (email[email.indexOf("@") + 1] == ".") {
          isValid = false;
        } else {
          let start = email.indexOf("@") + 1;
          let dotCount = 0;
          for (let i = start; i < email.length; i++) {
            if (email[i] == "." && email[i - 1] == ".") {
              isValid = false;
              break;
            }
            if (email[i] == ".") {
              dotCount++;
            }
          }

          if (dotCount == 0) {
            isValid = false;
          }
        }

        if (isValid) {
          span.innerHTML = "Valid Email";
          span.style.color = "green";
        } else {
          span.innerHTML = "Invalid Email";
          span.style.color = "red";
        }
      }
    </script>
  </body>
</html>
