<!-- 
Pan Card Validation
 
First 5 uppercase letters
Next 4 digits
Last 1 uppercase letter
-->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pan Card Validation</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .box {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
      }
      .box input {
        padding: 12px 16px;
        font-size: 18px;
        border-radius: 4px;
        margin-right: 12px;
      }
      .inputDiv {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Validate PAN Number</h1>
      <div class="inputDiv">
        <input
          type="text"
          placeholder="Enter PAN Number"
          onkeyup="validate(this.value)"
        />
        <span id="isValid"></span>
      </div>
    </div>

    <script>
      let span = document.getElementById("isValid");
      function validate(number) {
        isValid = true;
        if (number.length != 10) {
          isValid = false;
        } else {
          for (let i = 0; i < number.length; i++) {
            if (i < 5 && (number[i] < "A" || number[i] > "Z")) {
              isValid = false;
              break;
            } else if (
              i >= 5 &&
              i < 9 &&
              (number[i] < "0" || number[i] > "9")
            ) {
              isValid = false;
              break;
            } else if ((i == 9 && number[i] < "A") || number[i] > "Z") {
              isValid = false;
              break;
            }
          }
        }

        if (isValid) {
          span.innerHTML = "Valid Pan Number";
          span.style.color = "green";
        } else {
          span.innerHTML = "Invalid Pan Number";
          span.style.color = "red";
        }
      }
    </script>
  </body>
</html>
