<!-- 
 13. Dynamic Table Generator
Description: Create table from user input.
 -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table Generator</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      body {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .box {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        justify-content: center;
      }
      .inputBox {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .inputBox input {
        padding: 12px 16px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="inputBox">
        <input type="number" name="" id="rows" value="" placeholder="rows" />
        <input type="number" name="" id="cols" value="" placeholder="cols" />
        <input type="button" value="Create Table" onclick="createTable()" />
      </div>
      <div class="tableDiv" id="tableDiv"></div>
    </div>

    <script>
      let tableDiv = document.getElementById("tableDiv");
      let table = document.createElement("table");
      table.style.borderCollapse = "collapse";
      function createTable() {
        table.innerHTML = "";
        let rows = document.getElementById("rows").value;
        let cols = document.getElementById("cols").value;

        tableDiv.appendChild(table);

        for (let i = 1; i <= rows; i++) {
          let tr = document.createElement("tr");
          for (let j = 1; j <= cols; j++) {
            let td = document.createElement("td");
            td.style.borderCollapse = "collapse";
            let input = document.createElement("input");
            input.style.padding = "12px 16px";
            td.style.border = "1px solid black";
            td.appendChild(input);
            tr.appendChild(td);
          }
          table.appendChild(tr);
        }
      }
    </script>
  </body>
</html>
