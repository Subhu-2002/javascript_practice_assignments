<!-- 
 9.Change Font Size
 -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Font Size</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      body {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .box {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
      }
      .box p {
        text-align: center;
        font-size: 24px;
        font-weight: 600;
      }
      .box input {
        padding: 12px 16px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <p id="para">Change My Size</p>
      <input
        type="button"
        value="Change Font Size"
        onclick="changeFontSize()"
      />
    </div>

    <script>
      let isChanged = false;
      function changeFontSize() {
        if (isChanged) {
          let p = document.getElementById("para");
          p.style.fontSize = "24px";
          isChanged = false;
        } else {
          let p = document.getElementById("para");
          p.style.fontSize = "42px";
          isChanged = true; 
        }
      }
    </script>
  </body>
</html>
