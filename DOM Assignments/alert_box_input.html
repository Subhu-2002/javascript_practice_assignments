<!-- 
 10. Alert Input Value
Description: Show alert with entered text.
 -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alert Box</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      body {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .box {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
      }
      input {
        padding: 12px 16px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <input type="text" id="inputText" />
      <input type="button" value="Show Text" onclick="showAlert()" />
    </div>

    <script>
      function showAlert() {
        alert(document.getElementById("inputText").value);
      }
    </script>
  </body>
</html>
