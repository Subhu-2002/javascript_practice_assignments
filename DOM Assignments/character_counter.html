<!-- 
 12. Live Character Counter
 Description: Show characters typed in textarea.
 Description: Show popup on button click.
 -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Character Counter</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      body {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .box {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border: 1px solid #000;
        border-radius: 8px;
        position: relative;
        padding: 28px 12px;
        gap: 32px;
      }
      .box textarea {
        width: 520px;
        max-lines: 12;
        min-height: 120px;
        border: none;
        padding-top: 12px;
        outline: none;
        font-size: 18px;
      }
      .box p {
        position: absolute;
        top: 8px;
        font-size: 18px;
        right: 8px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <textarea
        name=""
        id="inputBox"
        onkeyup="countChar(this.value)"
      ></textarea>
      <p id="counter">0</p>
    </div>

    <script>
      function countChar(str) {
        document.getElementById("counter").innerHTML = str.length;
      }
    </script>
  </body>
</html>
